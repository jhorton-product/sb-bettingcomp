<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Board — Team Betting Competition</title>
<meta name="description" content="Internal team prediction & SGM competition portal." />
<style>
/* ============================================================================
   THE BOARD — design tokens
   A sportsbook "odds board": warm ink ground, emerald + gold, monospace figures.
   ============================================================================ */
:root{
  --ink:#0B0F0E;            /* base background, near-black w/ green undertone */
  --ink-2:#0E1413;
  --surface:#12191A;        /* cards */
  --surface-2:#182223;      /* elevated rows / inputs */
  --surface-3:#1F2C2D;      /* hover */
  --line:#26393A;           /* hairlines */
  --line-soft:#1C2728;

  --emerald:#23D29B;        /* primary / win */
  --emerald-dim:#0E8F6B;
  --emerald-ghost:rgba(35,210,155,.12);
  --red:#FF5C66;            /* loss */
  --red-ghost:rgba(255,92,102,.12);
  --gold:#F3C75A;           /* 1st */
  --silver:#C7D0D4;         /* 2nd */
  --bronze:#CF9259;         /* 3rd */
  --amber:#F3A33A;          /* pending / live */

  --text:#EAF2EF;
  --text-2:#A9B7B3;
  --muted:#6F807C;

  --radius:16px;
  --radius-sm:10px;
  --shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 18px 40px -24px rgba(0,0,0,.9);

  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,"Roboto Mono","JetBrains Mono",Menlo,Consolas,monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(35,210,155,.06), transparent 60%),
    radial-gradient(900px 500px at 100% 0%, rgba(243,199,90,.04), transparent 55%),
    var(--ink);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
.eyebrow{
  font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);font-weight:700;
}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--emerald);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--emerald);outline-offset:2px;border-radius:6px}

/* ----------------------------------------------------------------- layout */
.wrap{max-width:880px;margin:0 auto;padding:0 16px}

/* ----------------------------------------------------------------- header */
header.board{
  position:relative;z-index:20;
  background:linear-gradient(180deg, rgba(11,15,14,.92), rgba(11,15,14,.74));
  border-bottom:1px solid var(--line-soft);
}
.board-top{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px 0 10px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .logo{
  width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(145deg,var(--emerald),var(--emerald-dim));
  display:grid;place-items:center;color:#04140F;font-weight:900;font-size:18px;
  box-shadow:0 6px 20px -8px rgba(35,210,155,.7);
}
.brand .names{min-width:0}
.brand .comp{font-weight:800;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .comp small{color:var(--muted);font-weight:600}

.board-tools{display:flex;align-items:center;gap:8px;flex:none}
.userpick{
  display:flex;align-items:center;gap:7px;
  background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:5px 6px 5px 11px;max-width:180px;
}
.userpick .dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);flex:none;box-shadow:0 0 0 3px var(--emerald-ghost)}
.userpick select{
  background:transparent;border:none;color:var(--text);font-weight:700;font-size:13px;
  max-width:120px;text-overflow:ellipsis;padding-right:2px;
}
.userpick select:focus{outline:none}
.iconbtn{
  width:36px;height:36px;border-radius:10px;flex:none;
  background:var(--surface-2);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--text-2);
}
.iconbtn:hover{background:var(--surface-3);color:var(--text)}

/* event marquee row */
.event-row{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:4px 0 14px;
}
.event-name{font-weight:800;font-size:clamp(18px,3.4vw,24px);letter-spacing:-.02em;line-height:1.1}
.event-name .vs{color:var(--muted);font-weight:600;margin:0 6px}
.status-pill{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:6px 11px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface-2);color:var(--text-2);white-space:nowrap;
}
.status-pill .pulse{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.status-open{color:var(--emerald);border-color:rgba(35,210,155,.4);background:var(--emerald-ghost)}
.status-open .pulse{background:var(--emerald);animation:pulse 1.8s infinite}
.status-locked{color:var(--amber);border-color:rgba(243,163,58,.4);background:rgba(243,163,58,.1)}
.status-locked .pulse{background:var(--amber)}
.status-live{color:var(--red);border-color:rgba(255,92,102,.4);background:var(--red-ghost)}
.status-live .pulse{background:var(--red);animation:pulse 1.1s infinite}
.status-done{color:var(--text-2)}
@keyframes pulse{0%{box-shadow:0 0 0 0 currentColor;opacity:1}70%{box-shadow:0 0 0 7px transparent;opacity:.6}100%{opacity:1}}

/* countdown / meta strip */
.metastrip{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
  padding-bottom:12px;
}
.countdown{display:flex;align-items:flex-end;gap:8px}
.cd-unit{display:flex;flex-direction:column;align-items:center;gap:3px}
.cd-num{
  font-family:var(--mono);font-variant-numeric:tabular-nums;
  font-size:clamp(22px,5vw,30px);font-weight:700;line-height:1;letter-spacing:-.02em;
  background:linear-gradient(180deg,#fff,#9fb3ad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.cd-sep{font-family:var(--mono);font-size:22px;color:var(--line);font-weight:700;padding-bottom:14px}
.cd-lab{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
.countdown.done .cd-num{background:linear-gradient(180deg,var(--red),#b53b43);-webkit-background-clip:text;background-clip:text}
.meta-right{text-align:right}
.meta-right .big{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.meta-right .lab{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}

/* ----------------------------------------------------------------- tabs */
.tabbar{
  position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg,var(--ink) 60%,rgba(11,15,14,.7));
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);
}
.tabs{
  display:flex;gap:4px;
  background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:4px;margin:10px 0;
}
.tab{
  flex:1;border:none;background:transparent;color:var(--text-2);
  font-weight:700;font-size:13px;letter-spacing:.01em;
  padding:9px 6px;border-radius:999px;transition:.18s;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab .badge{font-family:var(--mono);font-size:11px;background:var(--surface-3);color:var(--text-2);padding:1px 6px;border-radius:999px}
.tab.active{background:linear-gradient(180deg,var(--emerald),var(--emerald-dim));color:#04140F;box-shadow:0 8px 22px -12px rgba(35,210,155,.8)}
.tab.active .badge{background:rgba(4,20,15,.22);color:#04140F}

main{padding-bottom:60px}
section[hidden]{display:none}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:22px 2px 12px}
.section-head h2{font-size:18px;font-weight:800;letter-spacing:-.02em;margin:0}
.section-head .hint{font-size:12px;color:var(--muted)}

/* ----------------------------------------------------------------- card */
.card{
  background:linear-gradient(180deg,var(--surface),var(--ink-2));
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
}

/* ----------------------------------------------------------------- leaderboard */
.lb{display:flex;flex-direction:column;gap:8px}
.lb-row{
  position:relative;display:grid;
  grid-template-columns:42px 1fr auto;gap:12px;align-items:center;
  padding:13px 16px 13px 12px;border-radius:14px;
  background:linear-gradient(180deg,var(--surface),var(--ink-2));
  border:1px solid var(--line);cursor:pointer;transition:.16s;
  width:100%;text-align:left;
}
.lb-row:hover{border-color:var(--emerald-dim);transform:translateY(-1px)}
.lb-rank{display:flex;flex-direction:column;align-items:center;gap:2px}
.rank-num{
  font-family:var(--mono);font-weight:700;font-size:18px;
  width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
  background:var(--surface-2);color:var(--text-2);border:1px solid var(--line);
}
.move{font-size:10px;font-weight:800;display:flex;align-items:center;gap:1px;height:11px}
.move.up{color:var(--emerald)}.move.down{color:var(--red)}.move.flat{color:var(--muted)}
.lb-name{min-width:0}
.lb-name .nm{font-weight:800;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-2);
  background:var(--surface-2);border:1px solid var(--line-soft);
  padding:2px 7px;border-radius:7px;white-space:nowrap;
}
.chip.win{color:var(--emerald)} .chip.loss{color:var(--red)}
.lb-total{display:flex;flex-direction:column;align-items:flex-end}
.lb-total .pts{font-family:var(--mono);font-weight:700;font-size:22px;line-height:1;letter-spacing:-.02em}
.lb-total .lab{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:3px}

/* medals */
.lb-row.r1{border-color:rgba(243,199,90,.55);background:linear-gradient(180deg,rgba(243,199,90,.10),var(--ink-2))}
.lb-row.r1 .rank-num{background:linear-gradient(145deg,var(--gold),#b8902f);color:#2a1f02;border-color:transparent}
.lb-row.r1 .pts{color:var(--gold)}
.lb-row.r2{border-color:rgba(199,208,212,.4)}
.lb-row.r2 .rank-num{background:linear-gradient(145deg,var(--silver),#8b9498);color:#1a1f20;border-color:transparent}
.lb-row.r3{border-color:rgba(207,146,89,.4)}
.lb-row.r3 .rank-num{background:linear-gradient(145deg,var(--bronze),#915f33);color:#1a0f06;border-color:transparent}
.crown{position:absolute;top:-9px;left:6px;font-size:15px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.6))}

/* ----------------------------------------------------------------- generic empty */
.empty{
  text-align:center;padding:38px 20px;color:var(--muted);
  border:1px dashed var(--line);border-radius:var(--radius);
}
.empty strong{display:block;color:var(--text-2);font-size:15px;margin-bottom:4px}

/* ----------------------------------------------------------------- tips */
.notice{
  display:flex;gap:11px;align-items:flex-start;padding:13px 15px;border-radius:12px;
  background:var(--surface-2);border:1px solid var(--line);margin-bottom:14px;font-size:13.5px;color:var(--text-2);
}
.notice .ic{flex:none;margin-top:1px}
.notice.warn{background:rgba(243,163,58,.08);border-color:rgba(243,163,58,.3);color:#f4c98a}
.notice.lock{background:var(--emerald-ghost);border-color:rgba(35,210,155,.3);color:#9be9cf}

.market{padding:15px 16px;margin-bottom:12px}
.market-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.market-head .mname{font-weight:800;font-size:15px;letter-spacing:-.01em}
.market-state{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.market-state.settled{color:var(--emerald)}
.outcomes{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:8px}
.outcome{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:11px 13px;border-radius:11px;text-align:left;
  background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  transition:.14s;font-weight:600;width:100%;
}
.outcome:hover:not(:disabled){border-color:var(--emerald-dim)}
.outcome .ol{font-size:13.5px;line-height:1.25;min-width:0;white-space:normal;overflow-wrap:anywhere;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
.outcome .odds{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--emerald);flex:none}
.outcome.sel{background:var(--emerald-ghost);border-color:var(--emerald);box-shadow:0 0 0 1px var(--emerald) inset}
.outcome.sel .ol{color:#fff;font-weight:800}
.outcome.won{background:var(--emerald-ghost);border-color:var(--emerald)}
.outcome.won .odds{color:var(--emerald)}
.outcome.lost{opacity:.5}
.outcome.lost.sel{background:var(--red-ghost);border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset;opacity:1}
.outcome.lost.sel .odds{color:var(--red)}
.outcome:disabled{cursor:default}
.result-tag{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:6px}
.result-tag.won{color:var(--emerald);background:var(--emerald-ghost)}
.result-tag.lost{color:var(--red);background:var(--red-ghost)}

/* ----------------------------------------------------------------- buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid var(--line);background:var(--surface-2);color:var(--text);
  font-weight:700;font-size:14px;padding:12px 18px;border-radius:12px;transition:.15s;
}
.btn:hover{background:var(--surface-3)}
.btn.primary{
  background:linear-gradient(180deg,var(--emerald),var(--emerald-dim));color:#04140F;border-color:transparent;
  box-shadow:0 12px 26px -14px rgba(35,210,155,.9);
}
.btn.primary:hover{filter:brightness(1.06)}
.btn.danger{color:var(--red);border-color:rgba(255,92,102,.35);background:var(--red-ghost)}
.btn.ghost{background:transparent}
.btn.block{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:10px}

/* ----------------------------------------------------------------- betting slip (signature) */
.slip{
  position:relative;background:linear-gradient(180deg,var(--surface),var(--ink-2));
  border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;
  overflow:hidden;
}
.slip-head{position:relative;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:16px;margin-bottom:16px;border-bottom:2px dashed var(--line)}
.slip-head::before,.slip-head::after{content:"";position:absolute;bottom:-8px;width:16px;height:16px;border-radius:50%;background:var(--ink);border:1px solid var(--line)}
.slip-head::before{left:-24px}
.slip-head::after{right:-24px}
.slip-user{display:flex;align-items:center;gap:9px;min-width:0}
.avatar{
  width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;
  font-weight:800;font-size:13px;color:#04140F;background:linear-gradient(145deg,var(--emerald),var(--emerald-dim));
}
.slip-user .u-meta{min-width:0}
.slip-user .u-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slip-user .u-time{font-size:11px;color:var(--muted)}
.slip-status{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:999px;border:1px solid var(--line);flex:none}
.slip-status.pending{color:var(--amber);background:rgba(243,163,58,.1);border-color:rgba(243,163,58,.35)}
.slip-status.won{color:var(--emerald);background:var(--emerald-ghost);border-color:rgba(35,210,155,.4)}
.slip-status.lost{color:var(--red);background:var(--red-ghost);border-color:rgba(255,92,102,.4)}
.slip-desc{font-weight:700;font-size:15px;letter-spacing:-.01em;margin:4px 0 12px}
.slip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-soft);border-radius:11px;overflow:hidden}
.slip-cell{background:var(--surface-2);padding:10px 12px}
.slip-cell .l{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
.slip-cell .v{font-family:var(--mono);font-weight:700;font-size:16px;margin-top:3px}
.slip-cell.ret .v{color:var(--emerald)}
.slip-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px}
.slip-foot .award{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--emerald)}
.slip-link{font-size:12px;color:var(--text-2);display:inline-flex;align-items:center;gap:5px}

/* ----------------------------------------------------------------- forms */
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
  border-radius:11px;padding:12px 13px;transition:.14s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--emerald);background:var(--ink-2)}
.field .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-note{font-size:12px;color:var(--muted);margin-top:-4px}
.collapse-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 16px;cursor:pointer;user-select:none;
}
.collapse-head .ttl{font-weight:800;font-size:15px}
.collapse-body{padding:0 16px 16px;border-top:1px solid var(--line-soft)}

/* ----------------------------------------------------------------- modal / overlay */
.overlay{
  position:fixed;inset:0;z-index:60;background:rgba(4,8,7,.72);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;padding:0;
  animation:fade .2s ease;
}
@media(min-width:640px){.overlay{align-items:center;padding:24px}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{
  width:100%;max-width:620px;max-height:92vh;overflow:auto;-webkit-overflow-scrolling:touch;
  background:linear-gradient(180deg,var(--surface),var(--ink));
  border:1px solid var(--line);border-radius:20px 20px 0 0;
  animation:rise .26s cubic-bezier(.2,.8,.2,1);
}
@media(min-width:640px){.sheet{border-radius:20px}}
@keyframes rise{from{transform:translateY(28px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-head{
  position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:16px 18px;background:linear-gradient(180deg,var(--surface),rgba(18,25,26,.86));
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft);
}
.sheet-head h3{margin:0;font-size:17px;font-weight:800;letter-spacing:-.02em}
.sheet-head .sub{font-size:12px;color:var(--muted)}
.sheet-body{padding:18px}
.close{width:32px;height:32px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-2);flex:none}
.close:hover{color:var(--text);background:var(--surface-3)}

/* profile summary */
.psum{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-soft);border-radius:13px;overflow:hidden;margin-bottom:18px}
.psum .c{background:var(--surface-2);padding:13px 10px;text-align:center}
.psum .v{font-family:var(--mono);font-weight:700;font-size:19px;line-height:1}
.psum .l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:5px}
.psum .c.tot .v{color:var(--gold)}
.detail-h{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:18px 0 9px}
.pick-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;background:var(--surface-2);border:1px solid var(--line-soft);border-radius:10px;margin-bottom:7px}
.pick-row .pk{min-width:0}
.pick-row .mk{font-size:11px;color:var(--muted)}
.pick-row .ch{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-row .pv{font-family:var(--mono);font-weight:700;font-size:14px;flex:none}
.pick-row.won{border-color:rgba(35,210,155,.35)}.pick-row.won .pv{color:var(--emerald)}
.pick-row.lost .pv{color:var(--red)}.pick-row.lost{opacity:.75}
.pick-row.pending .pv{color:var(--amber)}

/* admin */
.admin-sec{margin-bottom:20px}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

/* =========================================================================
   SUPABASE CLIENT  (the data layer)
   The whole app reads from a single `state` object and writes through the
   functions here. To move to another backend later, this is the only
   region that changes.
   ========================================================================= */
let sb = null;
function initClient(){
  if(!window.supabase || !window.supabase.createClient)
    throw new Error("The Supabase library didn't load — check the internet connection.");
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

/* who you are on THIS device — stored locally, never in the database */
function getLocalUser(){ try{ return localStorage.getItem("theboard.user")||null; }catch(e){ return null; } }
function setLocalUser(id){ try{ id?localStorage.setItem("theboard.user",id):localStorage.removeItem("theboard.user"); }catch(e){} }

let state = null;
let session = { isAdmin:false };
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-3); }

/* fetch every table and assemble the `state` shape the rest of the app uses */
async function loadState(){
  const [comp, parts, mkts, outs, subs, sgms] = await Promise.all([
    sb.from("competition").select("*").eq("id",1).maybeSingle(),
    sb.from("participants").select("*").order("name"),
    sb.from("markets").select("*").order("sort_order"),
    sb.from("outcomes").select("*").order("id"),
    sb.from("submissions").select("*"),
    sb.from("sgm_bets").select("*")
  ]);
  const err = comp.error||parts.error||mkts.error||outs.error||subs.error||sgms.error;
  if(err) throw err;

  const byMarket = {};
  (outs.data||[]).forEach(o=>{
    (byMarket[o.market_id] = byMarket[o.market_id]||[]).push({ id:o.id, label:o.label, points:Number(o.points) });
  });
  const c = comp.data;
  state = {
    competition: c
      ? { name:c.name, eventName:c.event_name, startTime:c.start_time, status:c.status }
      : { name:"", eventName:"", startTime:"", status:"Open" },
    participants: (parts.data||[]).map(p=>({ id:p.id, name:p.name, previousRank:p.previous_rank })),
    markets: (mkts.data||[]).map(m=>({ id:m.id, name:m.name, winningOutcomeId:m.winning_outcome_id, sortOrder:m.sort_order, outcomes:byMarket[m.id]||[] })),
    submissions: (subs.data||[]).map(s=>({ participantId:s.participant_id, selections:s.selections||{}, submittedAt:Date.parse(s.submitted_at)||Date.now(), locked:s.locked })),
    sgmBets: (sgms.data||[]).map(b=>({ id:b.id, participantId:b.participant_id, url:b.url, description:b.description, stake:Number(b.stake), odds:Number(b.odds), potentialReturn:Number(b.potential_return), status:b.status, submittedAt:Date.parse(b.submitted_at)||Date.now() })),
    currentUserId: getLocalUser()
  };
}

/* refetch from the server, then repaint. The single source of truth is the DB. */
async function commit(msg){
  try{ await loadState(); }
  catch(e){ toast("Couldn't sync with the league","err"); return; }
  renderAll();
  if(msg) toast(msg);
}

/* =========================================================================
   COMPUTE  (pure scoring — single source of truth)
   ========================================================================= */
function pickOf(sel){
  if(!sel) return null;
  if(typeof sel==="string") return { outcomeId:sel, stake:0 };
  return { outcomeId: (sel.outcomeId!=null?sel.outcomeId:sel.o), stake: Number(sel.stake!=null?sel.stake:(sel.s||0))||0 };
}
function findParticipant(id){ return state.participants.find(p=>p.id===id); }
function findMarket(id){ return state.markets.find(m=>m.id===id); }
function findOutcome(market, oid){ return market && market.outcomes.find(o=>o.id===oid); }
function getSubmission(pid){ return state.submissions.find(s=>s.participantId===pid) || null; }

function scoreParticipant(pid){
  let tipPoints=0, winningTips=0, losingTips=0, tipStaked=0, bestSingleWin=0, tipsBacked=0;
  const sub = getSubmission(pid);
  if(sub){
    for(const m of state.markets){
      const pk = pickOf(sub.selections[m.id]);
      if(!pk || !pk.outcomeId || pk.stake<=0) continue;
      tipsBacked++;
      tipStaked += pk.stake;
      if(!m.winningOutcomeId) continue;
      if(pk.outcomeId === m.winningOutcomeId){
        const o = findOutcome(m, pk.outcomeId);
        const win = pk.stake * (o?Number(o.points):0);
        tipPoints += win; winningTips++;
        if(win>bestSingleWin) bestSingleWin=win;
      } else { losingTips++; }
    }
  }
  const mySgms = state.sgmBets.filter(b=>b.participantId===pid);
  let sgmPoints=0, sgmWon=0, bestSgmWin=0;
  for(const b of mySgms){ if(b.status==="won"){ const r=Number(b.potentialReturn)||0; sgmPoints+=r; sgmWon++; if(r>bestSgmWin) bestSgmWin=r; } }
  const roi = tipStaked>0 ? (tipPoints - tipStaked)/tipStaked : null;
  return {
    tipPoints:round2(tipPoints), sgmPoints:round2(sgmPoints), total:round2(tipPoints+sgmPoints),
    winningTips, losingTips, sgmCount:mySgms.length, sgmWon,
    tipStaked:round2(tipStaked), bestSingleWin:round2(bestSingleWin), bestSgmWin:round2(bestSgmWin),
    betsWon: winningTips+sgmWon, tipsBacked, roi
  };
}
function computeStandings(){
  const rows = state.participants.map(p=>{
    const sc = scoreParticipant(p.id);
    return Object.assign({ id:p.id, name:p.name, previousRank:p.previousRank }, sc);
  });
  rows.sort((a,b)=> b.total - a.total || a.name.localeCompare(b.name));
  rows.forEach((r,i)=>{ r.rank=i+1; r.movement=(typeof r.previousRank==="number")?(r.previousRank-r.rank):0; });
  return rows;
}
function computeAwards(){
  const rows = computeStandings();
  function leader(fn){ let best=null; for(const r of rows){ const v=fn(r); if(v==null) continue; if(best==null||v>best.value) best={id:r.id,name:r.name,value:v}; } return best; }
  return {
    overall:       (rows[0] && rows[0].total>0) ? {id:rows[0].id,name:rows[0].name,value:rows[0].total} : null,
    highestSingle: leader(r=>r.bestSingleWin>0?r.bestSingleWin:null),
    mostWon:       leader(r=>r.betsWon>0?r.betsWon:null),
    highestSgm:    leader(r=>r.bestSgmWin>0?r.bestSgmWin:null),
    roi:           leader(r=>r.roi)
  };
}
function renderAwards(){
  const host=document.getElementById("awardsStrip"); if(!host) return;
  const a=computeAwards();
  const cards=[
    {ic:"🏆", lab:"Overall points", d:a.overall,       fmt:v=>fmtPts(v)+" pts"},
    {ic:"🚀", lab:"Highest single", d:a.highestSingle, fmt:v=>fmtPts(v)+" pts"},
    {ic:"🎯", lab:"Most bets won",  d:a.mostWon,       fmt:v=>v+" won"},
    {ic:"💥", lab:"Top SGM win",    d:a.highestSgm,    fmt:v=>fmtPts(v)+" pts"},
    {ic:"📈", lab:"Best ROI",       d:a.roi,           fmt:v=>`<span class="${v<0?'roineg':''}">${fmtRoi(v)}</span>`}
  ].filter(c=>c.d);
  if(!cards.length){ host.innerHTML=""; return; }
  host.innerHTML = `<div class="awards">`+cards.map(c=>`<div class="award-card" data-profile="${c.d.id}"><div class="aw-ic">${c.ic}</div><div class="aw-lab">${c.lab}</div><div class="aw-name">${esc(c.d.name)}</div><div class="aw-val mono">${c.fmt(c.d.value)}</div></div>`).join("")+`</div>`;
}
function round2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }
function fmtPts(n){ const v=round2(n); return Number.isInteger(v)?String(v):v.toFixed(2).replace(/\.?0+$/,""); }
function fmtRoi(roi){ if(roi==null) return "—"; return (roi>=0?"+":"")+Math.round(roi*100)+"%"; }
function money(n){ return "$"+(round2(n)).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }
function initials(name){ return name.split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase(); }
function relTime(ts){
  if(!ts) return "";
  const d=Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), day=Math.floor(d/86400000);
  if(d<60000) return "just now";
  if(m<60) return m+"m ago";
  if(h<24) return h+"h ago";
  if(day<7) return day+"d ago";
  return new Date(ts).toLocaleDateString();
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let cdTimer=null;
function renderCountdown(){
  const el = $("#countdown");

  function tick(){
    const diff = target - Date.now();
    if(isNaN(target)){ el.innerHTML = `<div class="cd-unit"><span class="cd-num">—</span><span class="cd-lab">start</span></div>`; return; }
    if(diff<=0){ el.classList.add("done"); el.innerHTML = `<div class="cd-unit"><span class="cd-num">LIVE</span><span class="cd-lab">event underway</span></div>`; return; }
    el.classList.remove("done");
    const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), mn=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
    const unit=(n,l)=>`<div class="cd-unit"><span class="cd-num">${String(n).padStart(2,"0")}</span><span class="cd-lab">${l}</span></div>`;
    const sep=`<span class="cd-sep">:</span>`;
    el.innerHTML = unit(d,"days")+sep+unit(h,"hrs")+sep+unit(mn,"min")+sep+unit(s,"sec");
  }
  tick();
  if(cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(tick,1000);
}

function bankrollInner(remain){

}
function updateStakeUI(changedMid){

function renderMarketReadonly(m, sel){
  const pk = pickOf(sel);
  const settled = !!m.winningOutcomeId;
  const outs = m.outcomes.map(o=>{
    const isPick = pk && pk.outcomeId===o.id;
    const isWin = settled && o.id===m.winningOutcomeId;
    let cls="outcome"; if(isPick) cls+=" sel";
    if(settled){ if(isWin) cls+=" won"; else cls+=" lost"; }
    return `<button class="${cls}" disabled type="button"><span class="ol">${esc(o.label)}</span><span class="odds">${fmtPts(o.points)}</span></button>`;
  }).join("");
  let tag='<span class="market-state">Pending</span>';
  if(pk && pk.outcomeId){
    if(settled){
      const po=findOutcome(m,pk.outcomeId);
      tag = pk.outcomeId===m.winningOutcomeId
        ? `<span class="result-tag won">Won +${fmtPts(pk.stake*(po?Number(po.points):0))}</span>`
        : `<span class="result-tag lost">Lost $${fmtPts(pk.stake)}</span>`;
    } else { tag = `<span class="market-state">$${fmtPts(pk.stake)} on</span>`; }
  } else if(settled){ tag='<span class="market-state settled">Settled</span>'; }
  return `<div class="card market"><div class="market-head"><span class="mname">${esc(m.name)}</span>${tag}</div><div class="outcomes">${outs}</div></div>`;
}

function openProfile(pid){
  const p = findParticipant(pid); if(!p) return;
  const sc = scoreParticipant(pid);
  const standings = computeStandings();
  const rank = standings.find(r=>r.id===pid).rank;
  const sub = getSubmission(pid);

  let tipsHtml;
  if(sub){
    tipsHtml = state.markets.map(m=>{
      const pk = pickOf(sub.selections[m.id]);
      if(!pk || !pk.outcomeId) return "";
      const o = findOutcome(m,pk.outcomeId);
      if(!o) return "";
      const settled = !!m.winningOutcomeId;
      let cls="pending", pv, note="Pending";
      if(settled){
        if(pk.outcomeId===m.winningOutcomeId){ cls="won"; pv="+"+fmtPts(pk.stake*Number(o.points)); note="Won"; }
        else { cls="lost"; pv="0"; note="Lost"; }
      } else { pv=fmtPts(pk.stake*Number(o.points)); }
      return `<div class="pick-row ${cls}"><div class="pk"><div class="mk">${esc(m.name)} · $${fmtPts(pk.stake)} @ ${fmtPts(o.points)} · ${note}</div><div class="ch">${esc(o.label)}</div></div><div class="pv">${pv}</div></div>`;
    }).join("") || `<div class="empty"><strong>No tips backed</strong>This slip is empty.</div>`;
  } else {
    tipsHtml = `<div class="empty"><strong>No tip slip submitted</strong>${esc(p.name)} hasn't locked in tips.</div>`;
  }

  const mySgms = [...state.sgmBets].filter(b=>b.participantId===pid).sort((a,b)=>(b.submittedAt||0)-(a.submittedAt||0));
  const sgmHtml = mySgms.length ? mySgms.map(b=>{
    const cls = b.status, pv = b.status==="won"?`+${fmtPts(b.potentialReturn)}`:(b.status==="lost"?"0":fmtPts(b.potentialReturn));
    return `<div class="pick-row ${cls}"><div class="pk"><div class="mk">${money(b.stake)} @ ${fmtPts(b.odds)} · ${b.status}</div><div class="ch">${esc(b.description||"SGM")}</div></div><div class="pv">${pv}</div></div>`;
  }).join("") : `<div class="empty"><strong>No SGMs yet</strong>${esc(p.name)} hasn't posted any SGMs.</div>`;

  const medal = rank<=3 ? ["🥇","🥈","🥉"][rank-1] : "";
  modal(`${medal} ${esc(p.name)}`, `Currently ranked #${rank} of ${state.participants.length}`, `
    <div class="psum">
      <div class="c tot"><div class="v">${fmtPts(sc.total)}</div><div class="l">Total</div></div>
      <div class="c"><div class="v">${fmtPts(sc.tipPoints)}</div><div class="l">Tip pts</div></div>
      <div class="c"><div class="v">${fmtPts(sc.sgmPoints)}</div><div class="l">SGM pts</div></div>
      <div class="c"><div class="v">#${rank}</div><div class="l">Rank</div></div>
    </div>
    <div class="detail-h">Tips · ${sc.winningTips}W ${sc.losingTips}L · $${fmtPts(sc.tipStaked)} staked · ROI <span class="${sc.roi!=null&&sc.roi<0?'roineg':''}">${fmtRoi(sc.roi)}</span></div>
    ${tipsHtml}
    <div class="detail-h">Same Game Multis · ${sc.sgmCount}</div>
    ${sgmHtml}
  `);
}

    </div>`,
    markets: `<div class="admin-card">

        <div class="eyebrow" style="flex:1 1 100%">Add a market</div>

/* one async helper so each admin action is: write -> resync -> repaint panel */
async function adminWrite(promise, msg){
  const { error } = await promise;
  if(error){ toast("Action failed: "+error.message,"err"); return false; }
  await commit(msg);
  if(session.isAdmin && $(".sheet")) renderAdminPanel();
  return true;
}

async function handleAdminAction(action, val){
  switch(action){
    case "status":
      return void adminWrite(sb.from("competition").update({status:val}).eq("id",1), "Status → "+val);
    case "lockAll":
      return void adminWrite(sb.from("competition").update({status:"Tips Locked"}).eq("id",1), "Tips locked");
    case "addUser":{
      const name=(($('[data-add="newUser"]')||{}).value||"").trim();
      if(!name) return toast("Enter a name","err");
      return void adminWrite(sb.from("participants").insert({id:uid("p"),name,previous_rank:state.participants.length+1}), "Added "+name);
    }
    case "rmUser":
      return void adminWrite(sb.from("participants").delete().eq("id",val), "Player removed");
    case "addMarket":{
      const name=(($('[data-add="newMarket"]')||{}).value||"").trim();
      if(!name) return toast("Enter a market name","err");
      const tpl=(($('[data-add="newMarketTpl"]')||{}).value)||"custom";
      const nextOrder=(state.markets.reduce((mx,m)=>Math.max(mx,m.sortOrder||0),0))+1;
      const mid=uid("m");
      const r1=await sb.from("markets").insert({id:mid,name,winning_outcome_id:null,sort_order:nextOrder});
      if(r1.error) return toast("Couldn't add market: "+r1.error.message,"err");
      const labels=templateOutcomes(tpl);
      if(labels.length){
        const r2=await sb.from("outcomes").insert(labels.map(l=>({id:uid("o"),market_id:mid,label:l,points:0})));
        if(r2.error) toast("Market added, but outcomes failed: "+r2.error.message,"err");
      }
      await commit("Market added — now set the prices"); if($(".sheet")) renderAdminPanel(); return;
    }
    case "rmMarket":
      return void adminWrite(sb.from("markets").delete().eq("id",val), "Market deleted");
    case "addOut":{
      const lab=(($(`[data-add="outLabel:${val}"]`)||{}).value||"").trim();
      const pts=parseFloat((($(`[data-add="outPts:${val}"]`)||{}).value));
      if(!lab) return toast("Enter an outcome label","err");
      if(isNaN(pts)||pts<=0) return toast("Enter a points value","err");
      return void adminWrite(sb.from("outcomes").insert({id:uid("o"),market_id:val,label:lab,points:round2(pts)}), "Outcome added");
    }
    case "rmOut":{
      const [mid,oid]=val.split(":"); const m=findMarket(mid);
      if(m && m.winningOutcomeId===oid) await sb.from("markets").update({winning_outcome_id:null}).eq("id",mid);
      return void adminWrite(sb.from("outcomes").delete().eq("id",oid), "Outcome removed");
    }
    case "setWin":{
      const [mid,oid]=val.split(":");
      return void adminWrite(sb.from("markets").update({winning_outcome_id:oid}).eq("id",mid), "Result marked");
    }
    case "clearWin":
      return void adminWrite(sb.from("markets").update({winning_outcome_id:null}).eq("id",val), "Market unsettled");
    case "sgmStatus":{
      const [bid,stt]=val.split(":");
      return void adminWrite(sb.from("sgm_bets").update({status:stt}).eq("id",bid), "SGM → "+stt);
    }
    case "recalc":
      await commit("Scores refreshed"); if($(".sheet")) renderAdminPanel(); return;
    case "snapshot":{
      const rows=computeStandings();
      const results = await Promise.all(rows.map(r=>sb.from("participants").update({previous_rank:r.rank}).eq("id",r.id)));
      if(results.some(r=>r.error)) return toast("Snapshot failed","err");
      await commit("Rank snapshot captured"); if($(".sheet")) renderAdminPanel(); return;
    }
    case "unlockUser":
      return openUnlockChooser();
    case "doUnlock":
      return void adminWrite(sb.from("submissions").delete().eq("participant_id",val), "Slip unlocked");
    case "logout":
      await sb.auth.signOut(); session.isAdmin=false; closeModal(); toast("Signed out of admin"); return;
    case "swapText":
      return swapOutcomeText();
    case "reset":
      return resetToSeed();
  }
}

function openUnlockChooser(){
  const submitted = state.submissions.map(s=>findParticipant(s.participantId)).filter(Boolean);
  if(!submitted.length){ toast("Nobody has submitted yet"); return; }
  modal("Unlock a slip","Let a player re-submit their tips.",`
    <p class="calc-note" style="margin-bottom:12px">This deletes the player's current tip slip so they can enter again while the competition is Open.</p>
    ${submitted.map(p=>`<div class="list-item"><span>${esc(p.name)}</span><button class="btn sm" data-adm="doUnlock" data-val="${p.id}">Unlock</button></div>`).join("")}
  `,{wide:true});
}

async function handleAdminEdit(path, value){
  let patch=null;
  if(path==="comp.name") patch={name:value};
  else if(path==="comp.eventName") patch={event_name:value};
  else if(path==="comp.startTime") patch={start_time:fromLocalInput(value)};
  if(!patch) return;
  const { error } = await sb.from("competition").update(patch).eq("id",1);
  if(error){ toast("Couldn't save: "+error.message,"err"); return; }
  await loadState(); renderHeader(); renderCountdown();
}
function toLocalInput(iso){
  const d=new Date(iso); if(isNaN(d)) return "";
  const pad=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fromLocalInput(v){ const d=new Date(v); return isNaN(d)?v:d.toISOString(); }

async function swapOutcomeText(){
  const f=((document.getElementById("swapFind")||{}).value||"").trim();
  const r=((document.getElementById("swapRepl")||{}).value||"");
  if(!f) return toast("Enter the text to find","err");
  const updates=[];
  for(const m of state.markets){ for(const o of m.outcomes){
    if(o.label.indexOf(f)>=0){ const nl=o.label.split(f).join(r); if(nl!==o.label) updates.push({id:o.id,label:nl}); }
  }}
  if(!updates.length) return toast('No outcomes contain "'+f+'"',"err");
  if(!confirm('Replace "'+f+'" with "'+r+'" in '+updates.length+' outcome'+(updates.length===1?'':'s')+'?')) return;
  const res=await Promise.all(updates.map(u=>sb.from("outcomes").update({label:u.label}).eq("id",u.id)));
  if(res.some(x=>x.error)) return toast("Some updates failed","err");
  await commit("Renamed "+updates.length+" outcome"+(updates.length===1?'':'s'));
  if($(".sheet")) renderAdminPanel();
}

async function updateOutcomeLabel(oid, value){
  const label=(value||"").trim();
  if(!label) return toast("Outcome name can't be empty","err");
  const { error } = await sb.from("outcomes").update({label}).eq("id",oid);
  if(error) return toast("Couldn't rename: "+error.message,"err");
  await commit("Outcome renamed");
}

async function updateOutcomePrice(oid, value){
  const pts=parseFloat(value);
  if(isNaN(pts)||pts<=0) return toast("Enter a valid price","err");
  const { error } = await sb.from("outcomes").update({points:round2(pts)}).eq("id",oid);
  if(error) return toast("Couldn't update price: "+error.message,"err");
  await commit("Price updated");
}

async function resetToSeed(){
  if(!confirm("Reset ALL data back to the seed values? This wipes every tip and SGM and cannot be undone.")) return;
  try{
    await sb.from("sgm_bets").delete().neq("id","");
    await sb.from("submissions").delete().neq("participant_id","");
    await sb.from("outcomes").delete().neq("id","");
    await sb.from("markets").delete().neq("id","");
    await sb.from("participants").delete().neq("id","");
    await sb.from("competition").delete().neq("id",0);
    const c=SEED.competition;
    await sb.from("competition").insert({id:1,name:c.name,event_name:c.eventName,start_time:c.startTime,status:c.status});
    await sb.from("participants").insert(SEED.participants.map(p=>({id:p.id,name:p.name,previous_rank:p.previousRank})));
    await sb.from("markets").insert(SEED.markets.map((m,i)=>({id:m.id,name:m.name,winning_outcome_id:m.winningOutcomeId,sort_order:i+1})));
    const outs=[]; SEED.markets.forEach(m=>m.outcomes.forEach(o=>outs.push({id:o.id,market_id:m.id,label:o.label,points:o.points})));
    await sb.from("outcomes").insert(outs);
    if(SEED.submissions.length) await sb.from("submissions").insert(SEED.submissions.map(s=>({participant_id:s.participantId,selections:s.selections,locked:true})));
    if(SEED.sgmBets.length) await sb.from("sgm_bets").insert(SEED.sgmBets.map(b=>({id:b.id,participant_id:b.participantId,url:b.url,description:b.description,stake:b.stake,odds:b.odds,potential_return:b.potentialReturn,status:b.status})));
    await commit("Reset to seed data");
    closeModal();
  }catch(e){ toast("Reset failed: "+(e.message||e),"err"); }
}

/* =========================================================================
   PLAYER ACTIONS
   ========================================================================= */
async function submitTips(){
  const pid=state.currentUserId;
  if(!pid) return toast("Pick your name first","err");
  if(state.competition.status!=="Open") return toast("Tips are closed","err");
  if(getSubmission(pid)) return toast("You've already submitted","err");
  const sel={}; let staked=0, n=0;
  for(const m of state.markets){
    const pk=pickOf(draftPicks[m.id]);
    if(pk && pk.outcomeId && pk.stake>0){ sel[m.id]={outcomeId:pk.outcomeId, stake:round2(pk.stake)}; staked+=pk.stake; n++; }
  }
  if(!n) return toast("Back at least one tip with a stake","err");
  if(round2(staked)>STARTING_BANKROLL) return toast("Over budget — you only have $"+STARTING_BANKROLL,"err");
  if(!confirm("Lock in "+n+" tip"+(n===1?'':'s')+" for $"+fmtPts(staked)+"? You can't change them after this.")) return;
  const { error } = await sb.from("submissions").insert({ participant_id:pid, selections:sel, locked:true });
  if(error){ toast(/duplicate|unique/i.test(error.message)?"You've already submitted":("Couldn't submit: "+error.message),"err"); await commit(); return; }
  draftPicks={};
  await commit("Tips locked in 🔒");
}

async function submitSGM(){
  const pid=state.currentUserId;
  if(!pid) return toast("Pick your name first","err");
  const url=$("#sgmUrl").value.trim(), desc=$("#sgmDesc").value.trim();
  const stake=parseFloat($("#sgmStake").value), odds=parseFloat($("#sgmOdds").value);
  let ret=parseFloat($("#sgmReturn").value);
  if(!desc) return toast("Add a description","err");
  if(isNaN(stake)||stake<0) return toast("Enter a valid stake","err");
  if(isNaN(odds)||odds<1) return toast("Enter valid odds","err");
  if(isNaN(ret)||ret<0) ret=round2(stake*odds);
  const { error } = await sb.from("sgm_bets").insert({ id:uid("s"), participant_id:pid, url, description:desc, stake:round2(stake), odds:round2(odds), potential_return:round2(ret), status:"pending" });
  if(error){ toast("Couldn't post: "+error.message,"err"); return; }
  ["#sgmUrl","#sgmDesc","#sgmStake","#sgmOdds","#sgmReturn"].forEach(s=>$(s).value="");
  await commit("SGM posted to feed");
  switchTab("sgm");
}

function friendlyError(e){
  const m=(e&&e.message)||String(e);
  if(/relation|does not exist|schema cache/i.test(m)) return "The database tables aren't set up yet. Run setup.sql in the Supabase SQL editor, then retry.";
  if(/api key|apikey|jwt|invalid|unauthorized|401/i.test(m)) return "The Supabase URL or publishable key looks wrong. Double-check the values at the top of the file.";
  if(/failed to fetch|network|load/i.test(m)) return "Network problem reaching Supabase. If the project sat idle a week it may be paused — open the dashboard and resume it.";
  return m;
}

/* =========================================================================
   LIVE SYNC — Supabase Realtime pushes every change instantly.
   A debounced refetch coalesces bursts; a focus + slow backstop covers any
   dropped socket so the board can never get stuck on stale data.
   ========================================================================= */
let channel=null, pollTimer=null, refreshT=null;
function refreshNow(){
  if(document.getElementById("bootOv")) return;       // not while disconnected
  loadState().then(()=>{ renderHeader(); renderLeaderboard(); if(!Object.keys(draftPicks).length) renderTips(); renderSGM(); }).catch(()=>{});
}
function scheduleRefresh(){ clearTimeout(refreshT); refreshT=setTimeout(refreshNow, 250); }
function onVisible(){ if(!document.hidden) scheduleRefresh(); }
function startLiveSync(){
  stopLiveSync();
  const tables=["competition","participants","markets","outcomes","submissions","sgm_bets"];
  let ch = sb.channel("board-changes");
  tables.forEach(t=> ch = ch.on("postgres_changes", { event:"*", schema:"public", table:t }, scheduleRefresh));
  channel = ch.subscribe();
  document.addEventListener("visibilitychange", onVisible);
  pollTimer = setInterval(()=>{ if(!document.hidden) refreshNow(); }, Math.max(20, POLL_SECONDS)*1000); // backstop only
}
function stopLiveSync(){
  if(channel){ try{ sb.removeChannel(channel); }catch(e){} channel=null; }
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  document.removeEventListener("visibilitychange", onVisible);
}

/* =========================================================================
   EVENT WIRING
   ========================================================================= */
function wire(){
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));

  $("#userSelect").addEventListener("change",e=>{
    const id=e.target.value||null;
    state.currentUserId=id; setLocalUser(id); draftPicks={}; renderAll();
    if(id) toast("You're "+findParticipant(id).name);
  });

  $("#adminBtn").addEventListener("click",openAdmin);

  $("#sgmFormToggle").addEventListener("click",()=>{
    const f=$("#sgmForm"); f.hidden=!f.hidden;
    $("#sgmFormToggle").querySelector(".ttl").textContent=(f.hidden?"＋ Submit an SGM":"− Hide form");
  });
  const recalcReturn=()=>{ const s=parseFloat($("#sgmStake").value), o=parseFloat($("#sgmOdds").value);
    if(!isNaN(s)&&!isNaN(o)&&document.activeElement!==$("#sgmReturn")) $("#sgmReturn").value=round2(s*o); };
  $("#sgmStake").addEventListener("input",recalcReturn);
  $("#sgmOdds").addEventListener("input",recalcReturn);
  $("#sgmSubmit").addEventListener("click",submitSGM);

  document.addEventListener("click",e=>{
    const at=e.target.closest("[data-admtab]"); if(at){ adminTab=at.dataset.admtab; renderAdminPanel(); return; }
    const mf=e.target.closest("[data-mktfilter]"); if(mf){ mktFilter=mf.dataset.mktfilter; mf.parentElement.querySelectorAll("[data-mktfilter]").forEach(b=>b.classList.toggle("active", b.dataset.mktfilter===mktFilter)); applyMarketFilter(); return; }
    const tc=e.target.closest("[data-tipscat]"); if(tc){ tipsCat=tc.dataset.tipscat; renderTips(); return; }
    const prof=e.target.closest("[data-profile]"); if(prof){ openProfile(prof.dataset.profile); return; }
    const pick=e.target.closest("[data-pick]");
    if(pick){
      const [mid,oid]=pick.dataset.pick.split(":");
      const prev=pickOf(draftPicks[mid])||{stake:0};
      draftPicks[mid]={ outcomeId:oid, stake:prev.stake||0 };
      pick.closest(".outcomes").querySelectorAll(".outcome").forEach(b=>b.classList.remove("sel"));
      pick.classList.add("sel");
      const mk=pick.closest(".market");
      const row=mk && mk.querySelector(".stake-row"); if(row) row.hidden=false;
      const ms=mk && mk.querySelector(".market-state"); if(ms) ms.textContent="Set your stake";
      updateStakeUI(mid);
      return;
    }
    const qa=e.target.closest("[data-addstake]");
    if(qa){
      const [mid,amt]=qa.dataset.addstake.split(":");
      const prev=pickOf(draftPicks[mid])||{};
      const ns=round2((prev.stake||0)+Number(amt));
      draftPicks[mid]={ outcomeId:prev.outcomeId, stake:ns };
      const inp=document.querySelector('[data-stake="'+mid+'"]'); if(inp) inp.value=ns;
      updateStakeUI(mid); return;
    }
    const qc=e.target.closest("[data-clearstake]");
    if(qc){
      const mid=qc.dataset.clearstake;
      const prev=pickOf(draftPicks[mid])||{};
      draftPicks[mid]={ outcomeId:prev.outcomeId, stake:0 };
      const inp=document.querySelector('[data-stake="'+mid+'"]'); if(inp) inp.value='';
      updateStakeUI(mid); return;
    }
    if(e.target.id==="idpConfirm"){
      const sel=document.getElementById("idpSelect"); const id=sel?sel.value:"";
      if(!id) return toast("Pick your name","err");
      state.currentUserId=id; setLocalUser(id); draftPicks={}; renderAll();
      toast("Welcome, "+findParticipant(id).name);
      return;
    }
    if(e.target.id==="submitTips"){ submitTips(); return; }
    const adm=e.target.closest("[data-adm]");
    if(adm){ handleAdminAction(adm.dataset.adm, adm.dataset.val); return; }
    if(e.target.closest("[data-close]") || e.target.matches("[data-overlay]")) closeModal();
  });

  document.addEventListener("blur",e=>{
    const ed=e.target.closest && e.target.closest("[data-edit]");
    if(ed){ handleAdminEdit(ed.dataset.edit, ed.value); return; }
    const el=e.target.closest && e.target.closest("[data-editlabel]");
    if(el){ updateOutcomeLabel(el.dataset.editlabel, el.value); return; }
    const eo=e.target.closest && e.target.closest("[data-editout]");
    if(eo) updateOutcomePrice(eo.dataset.editout, eo.value);
  },true);

  document.addEventListener("input",e=>{
    if(e.target.id==="mktSearch"){ filterMarkets(e.target.value); return; }
    const st=e.target.closest && e.target.closest("[data-stake]");
    if(!st) return;
    const mid=st.dataset.stake; let v=parseFloat(st.value); if(isNaN(v)||v<0) v=0;
    const prev=pickOf(draftPicks[mid])||{};
    draftPicks[mid]={ outcomeId:prev.outcomeId, stake:v };
    updateStakeUI(mid);
  });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape" && !document.getElementById("bootOv")) closeModal(); });
}

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot(){
  document.body.style.overflow="hidden";
  bootOverlay(`<div style="font-size:30px;margin-bottom:8px">⚡</div><strong style="display:block;font-size:16px">Connecting to the league…</strong>`);
  try{ if(!sb) initClient(); }
  catch(e){ bootError(friendlyError(e)); return; }
  try{ const { data } = await sb.auth.getSession(); session.isAdmin = !!(data && data.session); }catch(e){}
  try{ await loadState(); }
  catch(e){ bootError(friendlyError(e)); return; }
  clearBoot();
  renderAll(); renderCountdown(); startLiveSync();
}

if(!window.__wired){ window.__wired=true;
  const go=()=>{ wire(); boot(); };
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", go);
  else go();
}
</script>
</body>
